kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: spiffe-mcp-demo
nodes:
  - role: control-plane
    extraPortMappings:
      # Keycloak Admin Console & OAuth endpoints (NodePort 30080 → host 30080)
      # Access: http://localhost:30080/admin (admin/admin)
      # Realm:  http://localhost:30080/realms/mcp-demo
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # SPIFFE OIDC Discovery Provider (NodePort 30443 → host 30443)
      # JWKS:   https://localhost:30443/keys
      # Config: https://localhost:30443/.well-known/openid-configuration
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
  - role: worker
    labels:
      spire-agent: "true"
