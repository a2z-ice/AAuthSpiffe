<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#0e8c73"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#1abc9c;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#1abc9c;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.05" stroke="#1abc9c" stroke-width="1" fill="none">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="530"/>
    <line x1="800" y1="0" x2="1200" y2="430"/>
    <line x1="0" y1="200" x2="1200" y2="630"/>
    <line x1="0" y1="400" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="800" y1="0" x2="0" y2="530"/>
    <line x1="400" y1="0" x2="0" y2="430"/>
    <circle cx="600" cy="350" r="200" stroke-width="0.5"/>
    <circle cx="600" cy="350" r="300" stroke-width="0.5"/>
  </g>

  <!-- Glowing accent line -->
  <rect x="0" y="84" width="1200" height="2" fill="url(#glow)"/>

  <!-- Title Section -->
  <text x="600" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="16" fill="#1abc9c" letter-spacing="6" font-weight="600">ZERO-SECRET AUTHENTICATION FOR AI AGENTS</text>
  <text x="600" y="78" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11" fill="#ffffff88" letter-spacing="2">IETF draft-ietf-oauth-spiffe-client-auth &#x2022; github.com/a2z-ice/AAuthSpiffe</text>

  <!-- ==================== ARCHITECTURE DIAGRAM ==================== -->

  <!-- Kind Cluster outer box -->
  <rect x="60" y="105" width="1080" height="430" rx="12" fill="none" stroke="#1abc9c" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <rect x="60" y="95" width="230" height="22" rx="4" fill="#1a1a2e"/>
  <text x="70" y="110" font-family="monospace" font-size="12" fill="#1abc9c" font-weight="700">Kind Cluster: spiffe-mcp-demo</text>

  <!-- ===== LEFT: spire-system namespace ===== -->
  <rect x="85" y="135" width="380" height="380" rx="10" fill="#0d1b3e" stroke="#16a085" stroke-width="1.5" opacity="0.9"/>
  <rect x="95" y="127" width="110" height="18" rx="4" fill="#16a085"/>
  <text x="150" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="700">spire-system</text>

  <!-- SPIRE Server -->
  <rect x="105" y="158" width="340" height="50" rx="8" fill="#1a1a2e" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="130" cy="183" r="14" fill="#e74c3c" opacity="0.2"/>
  <text x="130" y="187" text-anchor="middle" font-family="sans-serif" font-size="16">&#9881;</text>
  <text x="155" y="179" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700">SPIRE Server</text>
  <text x="155" y="196" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff88">StatefulSet &#x2022; Signs JWT SVIDs &#x2022; CA</text>

  <!-- SPIRE Agent -->
  <rect x="105" y="218" width="340" height="50" rx="8" fill="#1a1a2e" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="130" cy="243" r="14" fill="#f39c12" opacity="0.2"/>
  <text x="130" y="248" text-anchor="middle" font-family="sans-serif" font-size="16">&#128274;</text>
  <text x="155" y="239" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700">SPIRE Agent</text>
  <text x="155" y="256" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff88">DaemonSet &#x2022; Workload Attestation</text>

  <!-- OIDC Discovery -->
  <rect x="105" y="278" width="340" height="50" rx="8" fill="#1a1a2e" stroke="#1abc9c" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="130" cy="303" r="14" fill="#1abc9c" opacity="0.2"/>
  <text x="130" y="308" text-anchor="middle" font-family="sans-serif" font-size="16">&#128273;</text>
  <text x="155" y="299" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700">OIDC Discovery Provider</text>
  <text x="155" y="316" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff88">Serves JWKS &#x2022; /.well-known/openid-configuration</text>

  <!-- CSI Driver -->
  <rect x="105" y="338" width="165" height="44" rx="8" fill="#1a1a2e" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
  <text x="120" y="365" font-family="-apple-system,sans-serif" font-size="11" fill="#3498db" font-weight="600">&#128190; CSI Driver</text>

  <!-- Controller Manager -->
  <rect x="280" y="338" width="165" height="44" rx="8" fill="#1a1a2e" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
  <text x="295" y="365" font-family="-apple-system,sans-serif" font-size="11" fill="#3498db" font-weight="600">&#127760; Controller Mgr</text>

  <!-- HTTP Proxy -->
  <rect x="105" y="392" width="340" height="40" rx="8" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1" filter="url(#shadow)"/>
  <text x="275" y="417" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#9b59b6" font-weight="600">&#128279; HTTP Proxy (OIDC frontend)</text>

  <!-- ===== RIGHT: mcp-demo namespace ===== -->
  <rect x="500" y="135" width="380" height="380" rx="10" fill="#0d1b3e" stroke="#16a085" stroke-width="1.5" opacity="0.9"/>
  <rect x="510" y="127" width="90" height="18" rx="4" fill="#16a085"/>
  <text x="555" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="700">mcp-demo</text>

  <!-- Keycloak -->
  <rect x="520" y="158" width="340" height="55" rx="8" fill="#1a1a2e" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="545" cy="186" r="14" fill="#3498db" opacity="0.2"/>
  <text x="545" y="190" text-anchor="middle" font-family="sans-serif" font-size="16">&#128272;</text>
  <text x="570" y="179" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" font-weight="700">Keycloak + SPIFFE SPIs</text>
  <text x="570" y="196" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff88">OAuth2 AS &#x2022; SVID Auth &#x2022; SPIFFE DCR</text>

  <!-- PostgreSQL -->
  <rect x="520" y="223" width="340" height="44" rx="8" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1" filter="url(#shadow)"/>
  <text x="545" y="250" text-anchor="middle" font-family="sans-serif" font-size="14">&#128451;</text>
  <text x="570" y="250" font-family="-apple-system,sans-serif" font-size="12" fill="#9b59b6" font-weight="600">PostgreSQL 16</text>
  <text x="700" y="250" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff66">Keycloak DB</text>

  <!-- MCP Client -->
  <rect x="520" y="278" width="340" height="55" rx="8" fill="#1a1a2e" stroke="#1abc9c" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="545" cy="306" r="14" fill="#1abc9c" opacity="0.25"/>
  <text x="545" y="311" text-anchor="middle" font-family="sans-serif" font-size="16">&#129302;</text>
  <text x="570" y="299" font-family="-apple-system,sans-serif" font-size="13" fill="#1abc9c" font-weight="700">MCP Client (AI Agent)</text>
  <text x="570" y="316" font-family="-apple-system,sans-serif" font-size="10" fill="#ffffff88">Python 3.12 &#x2022; Fetches SVID &#x2022; Token exchange</text>

  <!-- MCP Server -->
  <rect x="520" y="343" width="165" height="44" rx="8" fill="#1a1a2e" stroke="#16a085" stroke-width="1" filter="url(#shadow)"/>
  <text x="535" y="370" font-family="-apple-system,sans-serif" font-size="11" fill="#16a085" font-weight="600">&#9881; MCP Server</text>

  <!-- Test Runner -->
  <rect x="695" y="343" width="165" height="44" rx="8" fill="#1a1a2e" stroke="#16a085" stroke-width="1" filter="url(#shadow)"/>
  <text x="710" y="370" font-family="-apple-system,sans-serif" font-size="11" fill="#16a085" font-weight="600">&#128202; Test Runner</text>

  <!-- ===== FLOW ARROWS ===== -->

  <!-- Arrow: Agent -> Server (attestation) -->
  <line x1="275" y1="218" x2="275" y2="210" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Arrow: OIDC -> Keycloak (JWKS fetch) - crossing namespaces -->
  <path d="M 445 303 Q 480 303 500 220 L 520 186" fill="none" stroke="#1abc9c" stroke-width="2" stroke-dasharray="6,3" opacity="0.8"/>
  <text x="480" y="248" font-family="-apple-system,sans-serif" font-size="9" fill="#1abc9c" transform="rotate(-50,480,248)">JWKS fetch</text>

  <!-- Arrow: MCP Client -> Keycloak (token exchange) -->
  <path d="M 690 278 L 690 215" fill="none" stroke="#f1c40f" stroke-width="2.5" opacity="0.9"/>
  <polygon points="690,215 685,225 695,225" fill="#f1c40f" opacity="0.9"/>
  <text x="698" y="250" font-family="-apple-system,sans-serif" font-size="9" fill="#f1c40f">token req</text>

  <!-- Arrow: CSI Driver -> MCP Client (socket mount) -->
  <path d="M 270 360 Q 290 380 340 400 Q 430 430 520 325 L 518 305" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="400" y="445" font-family="-apple-system,sans-serif" font-size="9" fill="#3498db">SVID via CSI mount</text>

  <!-- ===== BOTTOM: Auth Flow Summary ===== -->
  <rect x="85" y="450" width="795" height="55" rx="8" fill="#0a0f1e" stroke="#1abc9c" stroke-width="1" opacity="0.95"/>

  <!-- Flow steps -->
  <rect x="100" y="460" width="100" height="34" rx="6" fill="#e74c3c"/>
  <text x="150" y="482" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#fff" font-weight="700">SPIRE CA</text>

  <text x="212" y="480" font-family="sans-serif" font-size="16" fill="#1abc9c">&#8594;</text>

  <rect x="225" y="460" width="100" height="34" rx="6" fill="#16a085"/>
  <text x="275" y="482" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#fff" font-weight="700">JWT SVID</text>

  <text x="337" y="480" font-family="sans-serif" font-size="16" fill="#1abc9c">&#8594;</text>

  <rect x="350" y="460" width="100" height="34" rx="6" fill="#0f3460"/>
  <text x="400" y="482" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#fff" font-weight="700">OIDC JWKS</text>

  <text x="462" y="480" font-family="sans-serif" font-size="16" fill="#1abc9c">&#8594;</text>

  <rect x="475" y="460" width="115" height="34" rx="6" fill="#3498db"/>
  <text x="532" y="482" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#fff" font-weight="700">Keycloak SPI</text>

  <text x="602" y="480" font-family="sans-serif" font-size="16" fill="#1abc9c">&#8594;</text>

  <rect x="615" y="460" width="115" height="34" rx="6" fill="#16a085"/>
  <text x="672" y="482" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#fff" font-weight="700">Access Token</text>

  <text x="750" y="480" font-family="sans-serif" font-size="14" fill="#1abc9c">&#10003;</text>

  <text x="775" y="483" font-family="-apple-system,sans-serif" font-size="9" fill="#ffffff88">Zero secrets used</text>

  <!-- ===== RIGHT: Stats Panel ===== -->
  <rect x="910" y="135" width="210" height="380" rx="12" fill="#0a0f1e" stroke="#1abc9c" stroke-width="1" opacity="0.95"/>

  <!-- Shield icon (CSS-drawn) -->
  <g transform="translate(1015,165)">
    <path d="M0,-25 L20,-15 L20,5 Q20,20 0,28 Q-20,20 -20,5 L-20,-15 Z" fill="none" stroke="#1abc9c" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1abc9c">&#10003;</text>
  </g>
  <text x="1015" y="210" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#ffffff88" letter-spacing="2">PROJECT STATS</text>

  <!-- Stat: Phases -->
  <text x="1015" y="250" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="36" fill="#1abc9c" font-weight="700">5</text>
  <text x="1015" y="268" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#ffffffaa">Deploy Phases</text>

  <!-- Stat: Tests -->
  <text x="1015" y="315" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="36" fill="#f1c40f" font-weight="700">80</text>
  <text x="1015" y="333" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#ffffffaa">Automated Tests</text>

  <!-- Stat: Secrets -->
  <text x="1015" y="380" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="36" fill="#e74c3c" font-weight="700">0</text>
  <text x="1015" y="398" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#ffffffaa">Static Secrets</text>

  <!-- Stat: TTL -->
  <text x="1015" y="445" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="36" fill="#3498db" font-weight="700">5m</text>
  <text x="1015" y="463" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#ffffffaa">SVID TTL</text>

  <!-- Tech stack badges -->
  <rect x="930" y="480" width="55" height="20" rx="4" fill="#e74c3c" opacity="0.8"/>
  <text x="957" y="494" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">Java</text>
  <rect x="990" y="480" width="38" height="20" rx="4" fill="#3498db" opacity="0.8"/>
  <text x="1009" y="494" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">Go</text>
  <rect x="1033" y="480" width="70" height="20" rx="4" fill="#f39c12" opacity="0.8"/>
  <text x="1068" y="494" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">Python</text>

  <!-- ===== BOTTOM BAR ===== -->
  <rect x="0" y="540" width="1200" height="90" fill="#0a0f1e" opacity="0.9"/>
  <rect x="0" y="540" width="1200" height="2" fill="url(#glow)"/>

  <text x="600" y="572" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="26" fill="#ffffff" font-weight="800" letter-spacing="-0.5">SPIFFE + MCP OAuth</text>
  <text x="600" y="598" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" fill="#1abc9c">Cryptographic Workload Identity  &#8226;  Keycloak Authorization Server  &#8226;  Kind Cluster</text>
  <text x="600" y="618" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff66">github.com/a2z-ice/AAuthSpiffe</text>
</svg>
