apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server
  namespace: mcp-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: mcp-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      serviceAccountName: mcp-server
      containers:
        - name: mcp-server
          image: python:3.12-slim
          command: ["sleep", "infinity"]
          env:
            - name: SPIFFE_ENDPOINT_SOCKET
              value: "unix:///spiffe-workload-api/spire-agent.sock"
            - name: KEYCLOAK_URL
              value: "http://keycloak.mcp-demo.svc.cluster.local:8080"
            - name: KEYCLOAK_REALM
              value: "mcp-demo"
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
